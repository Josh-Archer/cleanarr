name: Runner Selector

on:
  workflow_call:
    outputs:
      runner-label:
        description: Runner label for this repository.
        value: ${{ jobs.select-runner.outputs.runner-label }}

permissions:
  actions: read
  contents: read

jobs:
  select-runner:
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.set-runner.outputs.runner-label }}
    steps:
      - id: set-runner
        shell: bash
        env:
          USE_SELF_HOSTED: ${{ vars.USE_SELF_HOSTED }}
          SELF_HOSTED_RUNNER_LABEL: ${{ vars.SELF_HOSTED_RUNNER_LABEL }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail

          if [ "${EVENT_NAME}" = "pull_request" ]; then
            echo "runner-label=ubuntu-latest" >> "$GITHUB_OUTPUT"
          elif [ "${USE_SELF_HOSTED}" = "true" ] && [ -n "${SELF_HOSTED_RUNNER_LABEL}" ]; then
            echo "runner-label=${SELF_HOSTED_RUNNER_LABEL}" >> "$GITHUB_OUTPUT"
          else
            echo "runner-label=ubuntu-latest" >> "$GITHUB_OUTPUT"
          fi
